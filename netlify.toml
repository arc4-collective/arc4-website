# Netlify configuration for arc4-collective-site
# Static site — no build step, serves files directly from project root

[build]
  publish = "."

# SPA-ish fallback (single-page site): any unknown route serves index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Sensible caching
[[headers]]
  for = "/assets/photos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/styles/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/src/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
