<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ARC4 — Arctic Experience Designers</title>
<link rel="stylesheet" href="styles/tokens.css">
<link rel="icon" href="assets/arc4-mark.svg">
<style>
  html { scroll-behavior: smooth; }
  body {
    background: #000;
    overflow-x: hidden;
  }
  a { text-decoration: none; color: inherit; }
  button { font-family: inherit; }
  ::selection { background: #7dd3b8; color: #000; }

  /* Reusable ghost button base mirror for anchors */
  .ghost-link {
    display: inline-flex; align-items: center; gap: 14px;
    padding: 18px 32px;
    background: rgba(240,240,250,0.10);
    border: 1px solid rgba(240,240,250,0.35);
    border-radius: 32px;
    color: #f0f0fa;
    font-family: 'Barlow', Arial, sans-serif;
    font-size: 13px; font-weight: 700; letter-spacing: 1.17px;
    text-transform: uppercase; cursor: pointer;
    transition: background 180ms cubic-bezier(0.16,1,0.3,1), color 180ms cubic-bezier(0.16,1,0.3,1);
  }
  .ghost-link:hover { background: rgba(240,240,250,0.20); color: #fff; }

  /* scene entrance */
  @keyframes riseIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .rise-in { animation: riseIn 900ms cubic-bezier(0.16,1,0.3,1) both; }

  /* progressive photograph reveal */
  @keyframes slowZoom {
    from { transform: scale(1.08); }
    to   { transform: scale(1); }
  }

  /* tiny focus styles */
  input:focus, textarea:focus, select:focus { outline: none; }

  /* reduce motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    html { scroll-behavior: auto; }
  }
</style>
</head>
<body>
<div id="root"></div>

<!-- Netlify Forms: this hidden static form is what Netlify's build bot scans at deploy time.
     The real (React) form submits to the same form-name via fetch. Do not remove.
     NOTE: the `hidden` attribute breaks Netlify detection — use a CSS-hidden wrapper instead. -->
<div style="position:absolute;left:-9999px;top:-9999px;width:0;height:0;overflow:hidden" aria-hidden="true">
  <form name="enquire" method="POST" data-netlify="true" netlify-honeypot="bot-field">
    <input type="hidden" name="form-name" value="enquire" />
    <input type="text" name="bot-field" />
    <input type="text" name="name" />
    <input type="email" name="email" />
    <input type="text" name="company" />
    <input type="text" name="size" />
    <input type="text" name="dates" />
    <textarea name="message"></textarea>
  </form>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="src/Primitives.jsx"></script>
<script type="text/babel" src="src/Nav.jsx"></script>
<script type="text/babel" src="src/Hero.jsx"></script>
<script type="text/babel" src="src/Positioning.jsx"></script>
<script type="text/babel" src="src/Experiences.jsx"></script>
<script type="text/babel" src="src/Corporate.jsx"></script>
<script type="text/babel" src="src/Territory.jsx"></script>
<script type="text/babel" src="src/Enquire.jsx"></script>
<script type="text/babel" src="src/Footer.jsx"></script>
<script type="text/babel" src="src/App.jsx"></script>

<script type="text/babel">
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
